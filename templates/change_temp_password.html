<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meongstagram | Change Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="login-bg">
    <main class="login-page">
        <div class="login-card">
            <div class="login-left">
                <div class="logo">
                   <a href="{{ url_for('index') }}" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 12px;">
                       <i data-lucide="paw-print"></i>
                       <span>Meongstagram</span>
                   </a>
                </div>
                <h1 class="welcome-text">비밀번호 변경</h1>
                <p class="welcome-desc">현재 임시 비밀번호를 사용 중입니다. 새로운 비밀번호로 변경한 뒤 다시 로그인해 주세요.</p>
                <div class="dog-portrait-wrapper">
                    <img src="{{ url_for('static', filename='login_dog.png') }}" alt="Happy Dog" class="dog-portrait">
                </div>
            </div>

            <div class="login-right">
                <h2 style="font-size: 24px; font-weight: 800; margin-bottom: 30px;">새 비밀번호 설정</h2>

                <form class="login-form" action="{{ url_for('change_temp_password') }}" method="POST">
                    <div class="form-group">
                        <label>새 비밀번호</label>
                        <input type="password" name="new_password" placeholder="영문, 숫자, 특수문자 포함 8자 이상" required>
                    </div>
                    <div class="form-group">
                        <label>새 비밀번호 확인</label>
                        <input type="password" name="confirm_password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="login-submit">비밀번호 변경</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
