<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meongstagram | Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="login-bg">
    <main class="login-page">
        <div class="login-card">
            <div class="login-left">
                <div class="logo">
                   <a href="{{ url_for('index') }}" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 12px;">
                       <i data-lucide="paw-print"></i> 
                       <span>Meongstagram</span>
                   </a>
                </div>
                <h1 class="welcome-text">비밀번호 찾기</h1>
                <p class="welcome-desc">가입한 이메일 주소를 입력하면 임시 비밀번호를 발송해 드립니다.</p>
                <div class="dog-portrait-wrapper">
                    <img src="{{ url_for('static', filename='login_dog.png') }}" alt="Happy Dog" class="dog-portrait">
                </div>
            </div>
            
            <div class="login-right">
                <h2 style="font-size: 24px; font-weight: 800; margin-bottom: 30px;">비밀번호 찾기</h2>
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alert alert-{{ category }}" style="color: {{ 'red' if category == 'danger' else 'green' }}; margin-bottom: 16px; font-size: 14px; font-weight: 700;">{{ message }}</div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form class="login-form" action="{{ url_for('reset_password') }}" method="POST">
                    <div class="form-group">
                        <label>ID / 이메일</label>
                        <input type="text" name="identifier" placeholder="example@meong.com 또는 hansohui" required>
                    </div>
                    
                    <button type="submit" class="login-submit">임시 비밀번호 발송</button>
                    
                    <div class="signup-row" style="margin-top: 20px;">
                        기억나셨나요? <a href="{{ url_for('login') }}">로그인하기</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
