<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meongstagram | Edit Post</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background-color: #FAFAFA;">
    <header class="header">
        <div class="container header-container">
            <div class="logo">
                <a href="{{ url_for('index') }}" class="logo-text" style="text-decoration: none;">Meongstagram</a>
            </div>
            <nav class="nav">
                <a href="{{ url_for('index') }}" class="nav-link">Discover</a>
                <a href="{{ url_for('posts') }}" class="nav-link active">Community</a>
            </nav>
        </div>
    </header>

    <main style="padding: 60px 0;">
        <div class="container">
            <div class="edit-card" style="background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 800px; margin: 0 auto;">
                <h1 style="font-size: 24px; font-weight: 800; margin-bottom: 30px;">포스트 수정하기</h1>
                <form action="{{ url_for('edit_post', post_id=post.id) }}" method="POST">
                    <textarea name="content" style="width: 100%; height: 200px; border: 1px solid #EEE; border-radius: 16px; padding: 20px; font-family: inherit; resize: none; outline: none; margin-bottom: 20px;" required>{{ post.content }}</textarea>
                    <div style="display: flex; justify-content: flex-end; gap: 10px;">
                        <a href="{{ url_for('posts') }}" class="btn" style="padding: 12px 30px; background: #F5F5F5; color: #666; border-radius: 12px; text-decoration: none; font-weight: 700;">취소</a>
                        <button type="submit" class="btn btn-primary" style="padding: 12px 30px;">수정 완료</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
